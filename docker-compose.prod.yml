services:

  # --- Infrastructure ---

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin_systems}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    ports:
      - "15672:15672"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- App Services ---

  api-gateway:
    image: ${DOCKER_USERNAME}/daklak-api-gateway:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Reachable via Nginx internally on port 8080

  user-service:
    image: ${DOCKER_USERNAME}/daklak-user-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hrm-service:
    image: ${DOCKER_USERNAME}/daklak-hrm-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  media-service:
    image: ${DOCKER_USERNAME}/daklak-media-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification-service:
    image: ${DOCKER_USERNAME}/daklak-notification-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  posts-service:
    image: ${DOCKER_USERNAME}/daklak-posts-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  translate-service:
    image: ${DOCKER_USERNAME}/daklak-translate-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-frontend:
    image: ${DOCKER_USERNAME}/daklak-admin-khcn:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      api-gateway:
        condition: service_started
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Migration Jobs ---

  user-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-user-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hrm-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-hrm-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  media-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-media-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  posts-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-posts-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Nginx ---

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - admin-frontend

volumes:
  mysql_data:
  minio_data:
