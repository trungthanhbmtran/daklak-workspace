services:

  # =============================
  # Infrastructure
  # =============================

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin_systems}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # =============================
  # App Services
  # =============================

  api-gateway:
    image: ${DOCKER_USERNAME}/daklak-api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "8080:8080"

  user-service:
    image: ${DOCKER_USERNAME}/daklak-user-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_systems

  hrm-service:
    image: ${DOCKER_USERNAME}/daklak-hrm-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_hrm

  media-service:
    image: ${DOCKER_USERNAME}/daklak-media-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_media
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}

  posts-service:
    image: ${DOCKER_USERNAME}/daklak-posts-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_posts

  workflow-service:
    image: ${DOCKER_USERNAME}/daklak-workflow-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_workflow

  admin-frontend:
    image: ${DOCKER_USERNAME}/daklak-admin-khcn:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api-gateway
    env_file:
      - .env.production

  # =============================
  # Migration Jobs
  # =============================

  user-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-user-service:${IMAGE_TAG:-latest}
    profiles: [ "migrate" ]
    command: npx prisma migrate deploy
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=mysql://root:mypassword@mysql:3306/admin_systems

  hrm-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-hrm-service:${IMAGE_TAG:-latest}
    profiles: [ "migrate" ]
    command: npx prisma migrate deploy
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_hrm

  media-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-media-service:${IMAGE_TAG:-latest}
    profiles: [ "migrate" ]
    command: npx prisma migrate deploy
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_media

  posts-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-posts-service:${IMAGE_TAG:-latest}
    profiles: [ "migrate" ]
    command: npx prisma migrate deploy
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_posts

  workflow-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-workflow-service:${IMAGE_TAG:-latest}
    profiles: [ "migrate" ]
    command: npx prisma migrate deploy
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/admin_workflow

  # =============================
  # Nginx
  # =============================

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx:ro
    depends_on:
      - api-gateway
      - admin-frontend

volumes:
  mysql_data:
  minio_data:
