services:

  # --- Infrastructure ---

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mypassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin_systems}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "15672:15672"

  minio:
    image: minio/minio
    container_name: minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data

  # --- Services ---

  api-gateway:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-api-gateway:latest
    restart: always
    depends_on:
      - redis
      - rabbitmq
    ports:
      - "8080:8080"
    env_file:
      - .env

  user-service:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-user-service:latest
    restart: always
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
    ports:
      - "3001:50051"
    env_file:
      - .env

  hrm-service:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-hrm-service:latest
    restart: always
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "3002:50052"
    env_file:
      - .env

  media-service:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-media-service:latest
    restart: always
    depends_on:
      - minio
      - rabbitmq
    ports:
      - "3003:50059"
    env_file:
      - .env

  notification-service:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-notification-service:latest
    restart: always
    depends_on:
      - rabbitmq
      - redis
    env_file:
      - .env

  posts-service:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-posts-service:latest
    restart: always
    depends_on:
      - mysql
      - redis
      - rabbitmq
    ports:
      - "3005:50055"
    env_file:
      - .env

  translate-service:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-translate-service:latest
    restart: always
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "3006:50051"
    env_file:
      - .env

  admin-khcn:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-admin-khcn:latest
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "3007:3000"
    env_file:
      - .env

  # --- Migrations (DÙNG CHUNG IMAGE) ---

  user-service-migrate:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-user-service:latest
    command: npx prisma migrate deploy
    profiles: [ "migrate" ]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  hrm-service-migrate:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-hrm-service:latest
    command: npx prisma migrate deploy
    profiles: [ "migrate" ]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  media-service-migrate:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-media-service:latest
    command: npx prisma migrate deploy
    profiles: [ "migrate" ]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  posts-service-migrate:
    image: ${DOCKER_USERNAME:-thanhtran1993}/daklak-posts-service:latest
    command: npx prisma migrate deploy
    profiles: [ "migrate" ]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  # --- Nginx ---

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - admin-khcn

volumes:
  mysql_data:
  minio_data:
