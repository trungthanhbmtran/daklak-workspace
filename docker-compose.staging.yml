services:

  # --- Infrastructure ---

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin_systems_staging}
    volumes:
      - mysql_data_staging:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    ports:
      - "15673:15672" # Different port for staging management if needed

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio_data_staging:/data

  # --- App Services ---

  api-gateway:
    image: ${DOCKER_USERNAME}/daklak-api-gateway:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    env_file:
      - .env.staging

  user-service:
    image: ${DOCKER_USERNAME}/daklak-user-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    env_file:
      - .env.staging

  hrm-service:
    image: ${DOCKER_USERNAME}/daklak-hrm-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    env_file:
      - .env.staging

  media-service:
    image: ${DOCKER_USERNAME}/daklak-media-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env.staging

  notification-service:
    image: ${DOCKER_USERNAME}/daklak-notification-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_started
    env_file:
      - .env.staging

  posts-service:
    image: ${DOCKER_USERNAME}/daklak-posts-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    env_file:
      - .env.staging

  translate-service:
    image: ${DOCKER_USERNAME}/daklak-translate-service:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_started
    env_file:
      - .env.staging

  admin-frontend:
    image: ${DOCKER_USERNAME}/daklak-admin-khcn:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      api-gateway:
        condition: service_started
    env_file:
      - .env.staging

  # --- Migration Jobs ---

  user-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-user-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.staging

  hrm-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-hrm-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.staging

  media-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-media-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.staging

  posts-service-migrate:
    image: ${DOCKER_USERNAME}/daklak-posts-service:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy --schema=./prisma/schema.prisma
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.staging

  # --- Nginx ---

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8081:80" # Different port for staging
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api-gateway
      - admin-frontend

volumes:
  mysql_data_staging:
  minio_data_staging:
