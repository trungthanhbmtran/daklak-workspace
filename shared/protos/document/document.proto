syntax = "proto3";

package document;

import "common/common.proto";

service DocumentService {
  rpc CreateDocument(CreateDocumentRequest) returns (DocumentResponse) {}
  rpc GetDocument(GetDocumentRequest) returns (Document) {}
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse) {}
   rpc UpdateDocument(UpdateDocumentRequest) returns (DocumentResponse) {}
  rpc DeleteDocument(DeleteDocumentRequest) returns (common.DeleteResponse) {}
  rpc GetStatistics(common.Empty) returns (GetStatisticsResponse) {}
  rpc ExtractMetadata(ExtractMetadataRequest) returns (ExtractMetadataResponse) {}
  rpc SyncOnline(common.Empty) returns (SyncOnlineResponse) {}
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse) {}
  
  // Workflow methods
  rpc ReceiveDocument(WorkflowRequest) returns (DocumentResponse) {}
  rpc ProcessDocument(WorkflowRequest) returns (DocumentResponse) {}
  rpc FinalizeDocument(WorkflowRequest) returns (DocumentResponse) {}

  // Procedure & Dossier methods
  rpc CreateProcedure(CreateProcedureRequest) returns (ProcedureResponse) {}
  rpc GetProcedure(GetProcedureRequest) returns (ProcedureResponse) {}
  rpc ListProcedures(ListProceduresRequest) returns (ListProceduresResponse) {}
  rpc UpdateProcedure(UpdateProcedureRequest) returns (ProcedureResponse) {}
  rpc DeleteProcedure(DeleteProcedureRequest) returns (common.DeleteResponse) {}
  
  rpc CreateDossier(CreateDossierRequest) returns (DossierResponse) {}
  rpc GetDossier(GetDossierRequest) returns (DossierResponse) {}
  rpc ListDossiers(ListDossiersRequest) returns (ListDossiersResponse) {}
  rpc UpdateDossier(UpdateDossierRequest) returns (DossierResponse) {}
  rpc DeleteDossier(DeleteDossierRequest) returns (common.DeleteResponse) {}
}


message WorkflowRequest {
  string id = 1;
  string actorId = 2;
  optional string note = 3;
}

message GetLogsRequest {
  string documentId = 1;
}

message DocumentLog {
  string id = 1;
  string documentId = 2;
  string userId = 3;
  string userName = 4;
  string action = 5;
  string note = 6;
  string createdAt = 7;
}

message GetLogsResponse {
  repeated DocumentLog data = 1;
}

message SyncOnlineResponse {
  bool success = 1;
  int32 count = 2;
}

message GetStatisticsResponse {
  int32 incomingTotal = 1;
  int32 incomingPending = 2;
  int32 incomingLate = 3;
  int32 outgoingTotal = 4;
  int32 urgentTotal = 5;
}

message Document {
  string id = 1;
  string documentNumber = 2;
  string notation = 3;
  string abstract = 4;
  string content = 5;
  string typeId = 6;
  string fieldId = 7;
  string issuingAuthorityId = 8;
  string issuerName = 9;
  string signerId = 10;
  string signerName = 11;
  string signerPosition = 12;
  string issueDate = 13;
  string arrivalDate = 14;
  string arrivalNumber = 15;
  string processingDeadline = 16;
  string recipients = 17;
  string urgency = 18;
  string securityLevel = 19;
  string status = 20;
  bool isPublic = 21;
  bool isIncoming = 34;
  string fileId = 22;
  string fileUrl = 23;
  bool signatureValid = 24;
  int32 pageCount = 25;
  int32 attachmentCount = 26;
  string linkedDocumentId = 27;
  int32 fiscalYear = 28;
  string transparencyCategory = 29;
  string createdAt = 30;
  string updatedAt = 31;
  string typeName = 32;
  string fieldName = 33;
}

message DocumentResponse {
  Document data = 1;
}

message CreateDocumentRequest {
  string documentNumber = 1;
  string notation = 2;
  string abstract = 3;
  string content = 4;
  string typeId = 5;
  string fieldId = 6;
  string issuingAuthorityId = 7;
  string issuerName = 8;
  string signerName = 9;
  string signerPosition = 10;
  string issueDate = 11;
  string arrivalDate = 12;
  string arrivalNumber = 13;
  string processingDeadline = 14;
  string recipients = 15;
  string urgency = 16;
  string securityLevel = 17;
  string status = 18;
  bool isPublic = 19;
  bool isIncoming = 25;
  string fileId = 20;
  bool signatureValid = 21;
  int32 pageCount = 22;
  int32 attachmentCount = 23;
  string linkedDocumentId = 24;
  int32 fiscalYear = 26;
  string transparencyCategory = 27;
}

message GetDocumentRequest {
  string id = 1;
}

message ListDocumentsRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
  string typeId = 4;
  string fieldId = 5;
  string status = 6;
  string urgency = 7;
  string startDate = 8;
  string endDate = 9;
  optional bool isPublic = 10;
  int32 fiscalYear = 11;
  string transparencyCategory = 12;
  optional bool isIncoming = 13;
  string issuingAuthorityId = 14;
}

message ListDocumentsResponse {
  repeated Document data = 1;
  common.Meta meta = 2;
}

message UpdateDocumentRequest {
  string id = 1;
  // All optional fields for update
  optional string documentNumber = 2;
  optional string notation = 3;
  optional string abstract = 4;
  optional string content = 5;
  optional string typeId = 6;
  optional string fieldId = 7;
  optional string status = 8;
  optional string urgency = 9;
  optional bool isPublic = 10;
  optional bool isIncoming = 18;
  optional string arrivalNumber = 11;
  optional string arrivalDate = 12;
  optional string issueDate = 13;
  optional string issuerName = 14;
  optional string signerName = 15;
  optional string signerPosition = 16;
  optional string recipients = 17;
  optional int32 fiscalYear = 19;
  optional string transparencyCategory = 20;
  optional string comment = 30;
}

message DeleteDocumentRequest {
  string id = 1;
}

message ExtractMetadataRequest {
  string fileId = 1;
}

message ExtractMetadataResponse {
  string documentNumber = 1;
  string notation = 2;
  string abstract = 3;
  string typeId = 4;
  string fieldId = 5;
  string issuerName = 6;
  string signerName = 7;
  string signerPosition = 8;
  string issueDate = 9;
  string recipients = 10;
  int32 pageCount = 11;
  bool signatureValid = 12;
}

message Procedure {
  string id = 1;
  string code = 2;
  string name = 3;
  string category = 4;
  string description = 5;
  string duration = 6;
  string fee = 7;
  repeated string requiredDocs = 8;
  repeated string steps = 9;
  string createdAt = 10;
  string updatedAt = 11;
}

message ProcedureResponse {
  Procedure data = 1;
}

message CreateProcedureRequest {
  string code = 1;
  string name = 2;
  string category = 3;
  string description = 4;
  string duration = 5;
  string fee = 6;
  repeated string requiredDocs = 7;
  repeated string steps = 8;
}

message ListProceduresRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
  string category = 4;
}

message ListProceduresResponse {
  repeated Procedure data = 1;
  common.Meta meta = 2;
}

message UpdateProcedureRequest {
  string id = 1;
  optional string code = 2;
  optional string name = 3;
  optional string category = 4;
  optional string description = 5;
  optional string duration = 6;
  optional string fee = 7;
  repeated string requiredDocs = 8;
  repeated string steps = 9;
}

message DeleteProcedureRequest {
  string id = 1;
}

message GetProcedureRequest {
  string id = 1;
}

message Dossier {
  string id = 1;
  string code = 2;
  string senderName = 3;
  string receiveDate = 4;
  string dueDate = 5;
  string status = 6;
  int32 currentStep = 7;
  string stepDetails = 8;
  string createdAt = 9;
  string updatedAt = 10;
}

message DossierResponse {
  Dossier data = 1;
}

message CreateDossierRequest {
  string code = 1;
  string senderName = 2;
  string receiveDate = 3;
  string dueDate = 4;
  string status = 5;
  int32 currentStep = 6;
  string stepDetails = 7;
}

message GetDossierRequest {
  string id = 1;
  optional string code = 2;
}

message ListDossiersRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
  string status = 4;
}

message ListDossiersResponse {
  repeated Dossier data = 1;
  common.Meta meta = 2;
}

message UpdateDossierRequest {
  string id = 1;
  optional string code = 2;
  optional string senderName = 3;
  optional string receiveDate = 4;
  optional string dueDate = 5;
  optional string status = 6;
  optional int32 currentStep = 7;
  optional string stepDetails = 8;
}

message DeleteDossierRequest {
  string id = 1;
}

