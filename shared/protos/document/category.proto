syntax = "proto3";

package category;

import "common/common.proto";

service CategoryService {
  rpc CreateCategory(CreateCategoryRequest) returns (CategoryResponse) {}
  rpc GetCategory(GetCategoryRequest) returns (Category) {}
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse) {}
  rpc UpdateCategory(UpdateCategoryRequest) returns (CategoryResponse) {}
  rpc DeleteCategory(DeleteCategoryRequest) returns (common.DeleteResponse) {}
}

message Category {
  string id = 1;
  string name = 2;
  string slug = 3;
  string parentId = 4;
  int32 lft = 5;
  int32 rgt = 6;
  int32 depth = 7;
  bool status = 8;
  int32 orderIndex = 9;
  string description = 10;
  string type = 11;
  bool isGovStandard = 12;
  string createdAt = 13;
  string updatedAt = 14;
}

message CategoryResponse {
  Category data = 1;
}

message CreateCategoryRequest {
  string name = 1;
  string slug = 2;
  string parentId = 3;
  string description = 4;
  string type = 5;
  bool isGovStandard = 6;
  int32 orderIndex = 7;
}

message GetCategoryRequest {
  string id = 1;
}

message ListCategoriesRequest {
  int32 page = 1;
  int32 limit = 2;
  string type = 3;
  string search = 4;
  string parentId = 5;
  bool onlyRoot = 6;
}

message ListCategoriesResponse {
  repeated Category data = 1;
  common.Meta meta = 2;
}

message UpdateCategoryRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string parentId = 4;
  int32 orderIndex = 5;
  bool status = 6;
}

message DeleteCategoryRequest {
  string id = 1;
}
