syntax = "proto3";

package task;

import "common/common.proto";
service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse) {}
  rpc ListTasks (ListTasksRequest) returns (ListTasksResponse) {}
  rpc UpdateTaskStatus (UpdateTaskStatusRequest) returns (TaskResponse) {}
}

service TaskTemplateService {
  rpc FindAll (FindAllTemplatesRequest) returns (FindAllTemplatesResponse) {}
  rpc Create (CreateTemplateRequest) returns (TaskTemplateDataResponse) {}
  rpc Update (UpdateTemplateRequest) returns (TaskTemplateDataResponse) {}
  rpc Delete (DeleteTemplateRequest) returns (DeleteTemplateResponse) {}
}

message TaskTemplateDataResponse {
  bool success = 1;
  string message = 2;
  TaskTemplateResponse data = 3;
}

message TaskResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string assigneeCode = 4;
  string assignerCode = 5;
  string status = 6;
  string dueDate = 7;
  string createdAt = 8;
  string updatedAt = 9;
  
  float baseScore = 10;
  float weight = 11;
  string scoringMethod = 12;
  float bonusPerDay = 13;
  float penaltyPerDay = 14;
  string supervisorCode = 15;
  int32 planId = 16;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string assigneeCode = 3;
  string assignerCode = 4;
  string dueDate = 5;
  
  float baseScore = 6;
  float weight = 7;
  string scoringMethod = 8;
  float bonusPerDay = 9;
  float penaltyPerDay = 10;
  string supervisorCode = 11;
  int32 planId = 12;
}

message ListTasksRequest {
  string assigneeCode = 1; // optional
}

message ListTasksResponse {
  repeated TaskResponse tasks = 1;
}

message UpdateTaskStatusRequest {
  int32 id = 1;
  string status = 2;
}

message TaskTemplateResponse {
  int32 id = 1;
  string classification = 2;
  string rank = 3;
  string taskName = 4;
  string defaultUnit = 5;
  float defaultWeight = 6;
  string createdAt = 7;
  string updatedAt = 8;
}

message FindAllTemplatesRequest {
  string classification = 1;
  string rank = 2;
}

message FindAllTemplatesResponse {
  bool success = 1;
  string message = 2;
  repeated TaskTemplateResponse data = 3;
  common.Meta meta = 4;
}

message CreateTemplateRequest {
  string classification = 1;
  string rank = 2;
  string taskName = 3;
  string defaultUnit = 4;
  float defaultWeight = 5;
}

message UpdateTemplateRequest {
  int32 id = 1;
  string classification = 2;
  string rank = 3;
  string taskName = 4;
  string defaultUnit = 5;
  float defaultWeight = 6;
}

message DeleteTemplateRequest {
  int32 id = 1;
}

message DeleteTemplateResponse {
  bool success = 1;
  string message = 2;
}
