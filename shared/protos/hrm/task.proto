syntax = "proto3";

package task;

import "common/common.proto";
service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse) {}
  rpc ListTasks (ListTasksRequest) returns (ListTasksResponse) {}
  rpc UpdateTaskStatus (UpdateTaskStatusRequest) returns (TaskResponse) {}
  rpc UpdateTask (UpdateTaskRequest) returns (TaskResponse) {}
  rpc RecommendAssignees (RecommendAssigneesRequest) returns (RecommendAssigneesResponse) {}
  rpc AssignTask (AssignTaskRequest) returns (TaskResponse) {}
  rpc AddComment (AddCommentRequest) returns (TaskCommentResponse) {}
  rpc GetComments (GetCommentsRequest) returns (GetCommentsResponse) {}
  rpc GetSubTasks (GetSubTasksRequest) returns (GetSubTasksResponse) {}
}

message AssignTaskRequest {
  int32 id = 1;
  string assigneeCode = 2;
  int32 departmentId = 3;
}

message RecommendAssigneesRequest {
  string rankCode = 1;
  string strategy = 2; // "HIGH_PERFORMANCE" or "LOW_PERFORMANCE"
}

message AssigneeRecommendation {
  string employeeCode = 1;
  string employeeName = 2;
  float currentLoad = 3;
  float performanceScore = 4;
  float matchScore = 5;
  int32 departmentId = 6;
}

message DepartmentRecommendation {
  int32 departmentId = 1;
  float currentLoad = 2;
  float performanceScore = 3;
  float matchScore = 4;
  int32 employeeCount = 5;
}

message RecommendAssigneesData {
  repeated AssigneeRecommendation topEmployees = 1;
  repeated DepartmentRecommendation topDepartments = 2;
}

message RecommendAssigneesResponse {
  bool success = 1;
  string message = 2;
  RecommendAssigneesData data = 3;
}

service TaskTemplateService {
  rpc FindAll (FindAllTemplatesRequest) returns (FindAllTemplatesResponse) {}
  rpc Create (CreateTemplateRequest) returns (TaskTemplateDataResponse) {}
  rpc Update (UpdateTemplateRequest) returns (TaskTemplateDataResponse) {}
  rpc Delete (DeleteTemplateRequest) returns (DeleteTemplateResponse) {}
  rpc BulkUpdate (BulkUpdateTemplatesRequest) returns (BulkUpdateTemplatesResponse) {}
}

message TaskTemplateDataResponse {
  bool success = 1;
  string message = 2;
  TaskTemplateResponse data = 3;
}

message TaskResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string assigneeCode = 4;
  string assignerCode = 5;
  string status = 6;
  string dueDate = 7;
  string createdAt = 8;
  string updatedAt = 9;
  
  float baseScore = 10;
  float weight = 11;
  string scoringMethod = 12;
  float bonusPerDay = 13;
  float penaltyPerDay = 14;
  string supervisorCode = 15;
  int32 planId = 16;
  string assigneeName = 17;
  int32 departmentId = 18;
  string startDate = 19;
  int32 parentId = 20;
  string rejectReason = 21;
  string assignerName = 22;  // Tên người giao việc
  string priority = 23;      // Mức độ ưu tiên
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string assigneeCode = 3;
  string assignerCode = 4;
  string dueDate = 5;
  
  float baseScore = 6;
  float weight = 7;
  string scoringMethod = 8;
  float bonusPerDay = 9;
  float penaltyPerDay = 10;
  string supervisorCode = 11;
  int32 planId = 12;
  int32 departmentId = 13;
  string startDate = 14;
  int32 parentId = 15;
}

message ListTasksRequest {
  string assigneeCode = 1; // optional
  string filter = 2; // optional (overdue, dueIn3Days, dueIn7Days, dueOver7Days)
  string search = 3; // optional
  int32 departmentId = 4; // optional
  bool isSupervisor = 5; // optional
  string currentUserCode = 6; // optional
  bool isAdmin = 7; // optional
  int32 currentUserDept = 8; // optional
  string assignerCode = 9; // optional - lọc theo người giao việc (tab Đã giao)
  string status = 10; // optional - lọc theo trạng thái
  string priority = 11; // optional - lọc theo mức độ ưu tiên
}

message TaskStats {
  int32 overdueCount = 1;
  int32 dueIn3DaysCount = 2;
  int32 dueIn7DaysCount = 3;
  int32 dueOver7DaysCount = 4;
}

message ListTasksResponse {
  bool success = 1;
  string message = 2;
  repeated TaskResponse data = 3;
  common.Meta meta = 4;
  TaskStats stats = 5;
}

message UpdateTaskStatusRequest {
  int32 id = 1;
  string status = 2;
  string rejectReason = 3; // optional
}

message UpdateTaskRequest {
  int32 id = 1;
  float weight = 2;
  string startDate = 3;
  string dueDate = 4;
  string priority = 5;
  float baseScore = 6;
  string title = 7;
  string description = 8;
}

message TaskTemplateResponse {
  int32 id = 1;
  string classification = 2;
  string rank = 3;
  string taskName = 4;
  string defaultUnit = 5;
  float defaultWeight = 6;
  string createdAt = 7;
  string updatedAt = 8;
}

message FindAllTemplatesRequest {
  string classification = 1;
  string rank = 2;
}

message FindAllTemplatesResponse {
  bool success = 1;
  string message = 2;
  repeated TaskTemplateResponse data = 3;
  common.Meta meta = 4;
}

message CreateTemplateRequest {
  string classification = 1;
  string rank = 2;
  string taskName = 3;
  string defaultUnit = 4;
  float defaultWeight = 5;
}

message UpdateTemplateRequest {
  int32 id = 1;
  string classification = 2;
  string rank = 3;
  string taskName = 4;
  string defaultUnit = 5;
  float defaultWeight = 6;
}

message DeleteTemplateRequest {
  int32 id = 1;
}

message DeleteTemplateResponse {
  bool success = 1;
  string message = 2;
}

message BulkUpdateTemplatesRequest {
  repeated CreateTemplateRequest templates = 1;
}

message BulkUpdateTemplatesResponse {
  bool success = 1;
  string message = 2;
}

message TaskCommentResponse {
  int32 id = 1;
  int32 taskId = 2;
  string authorCode = 3;
  string authorName = 4;
  string authorAvatar = 5;
  string content = 6;
  bool isSystemMessage = 7;
  string createdAt = 8;
}

message AddCommentRequest {
  int32 taskId = 1;
  string authorCode = 2;
  string content = 3;
  bool isSystemMessage = 4;
}

message GetCommentsRequest {
  int32 taskId = 1;
}

message GetCommentsResponse {
  bool success = 1;
  string message = 2;
  repeated TaskCommentResponse data = 3;
}

// Chuỗi giao việc - mỗi node là một bước trong timeline
message DelegationNode {
  int32 id = 1;
  string title = 2;
  string status = 3;
  string priority = 4;
  string assigneeCode = 5;
  string assigneeName = 6;
  string assignerCode = 7;
  string assignerName = 8;
  int32 departmentId = 9;
  int32 parentId = 10;
  string dueDate = 11;
  string createdAt = 12;
  bool isParent = 13;      // Đây là task cha (cấp trên đã giao task này)
  bool isCurrent = 14;     // Đây là task đang xem
  bool isChild = 15;       // Task con (bất kỳ cấp nào)
  bool isGrandChild = 16;  // Giữ lại để tương thích
  int32 level = 17;        // Cấp độ: -1=cha, 0=hiện tại, 1,2,3...=các cấp con (không giới hạn)
}

message GetSubTasksRequest {
  int32 taskId = 1;
}

message GetSubTasksResponse {
  bool success = 1;
  string message = 2;
  repeated DelegationNode data = 3;
}
