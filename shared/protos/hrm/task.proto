syntax = "proto3";

package task;

import "common/common.proto";
service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse) {}
  rpc ListTasks (ListTasksRequest) returns (ListTasksResponse) {}
  rpc UpdateTaskStatus (UpdateTaskStatusRequest) returns (TaskResponse) {}
  rpc RecommendAssignees (RecommendAssigneesRequest) returns (RecommendAssigneesResponse) {}
  rpc AssignTask (AssignTaskRequest) returns (TaskResponse) {}
}

message AssignTaskRequest {
  int32 id = 1;
  string assigneeCode = 2;
}

message RecommendAssigneesRequest {
  string rankCode = 1;
  string strategy = 2; // "HIGH_PERFORMANCE" or "LOW_PERFORMANCE"
}

message AssigneeRecommendation {
  string employeeCode = 1;
  string employeeName = 2;
  float currentLoad = 3;
  float performanceScore = 4;
  float matchScore = 5;
}

message RecommendAssigneesResponse {
  bool success = 1;
  string message = 2;
  repeated AssigneeRecommendation data = 3;
}

service TaskTemplateService {
  rpc FindAll (FindAllTemplatesRequest) returns (FindAllTemplatesResponse) {}
  rpc Create (CreateTemplateRequest) returns (TaskTemplateDataResponse) {}
  rpc Update (UpdateTemplateRequest) returns (TaskTemplateDataResponse) {}
  rpc Delete (DeleteTemplateRequest) returns (DeleteTemplateResponse) {}
  rpc BulkUpdate (BulkUpdateTemplatesRequest) returns (BulkUpdateTemplatesResponse) {}
}

message TaskTemplateDataResponse {
  bool success = 1;
  string message = 2;
  TaskTemplateResponse data = 3;
}

message TaskResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string assigneeCode = 4;
  string assignerCode = 5;
  string status = 6;
  string dueDate = 7;
  string createdAt = 8;
  string updatedAt = 9;
  
  float baseScore = 10;
  float weight = 11;
  string scoringMethod = 12;
  float bonusPerDay = 13;
  float penaltyPerDay = 14;
  string supervisorCode = 15;
  int32 planId = 16;
  string assigneeName = 17;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string assigneeCode = 3;
  string assignerCode = 4;
  string dueDate = 5;
  
  float baseScore = 6;
  float weight = 7;
  string scoringMethod = 8;
  float bonusPerDay = 9;
  float penaltyPerDay = 10;
  string supervisorCode = 11;
  int32 planId = 12;
}

message ListTasksRequest {
  string assigneeCode = 1; // optional
  string filter = 2; // optional (overdue, dueIn3Days, dueIn7Days, dueOver7Days)
  string search = 3; // optional
}

message TaskStats {
  int32 overdueCount = 1;
  int32 dueIn3DaysCount = 2;
  int32 dueIn7DaysCount = 3;
  int32 dueOver7DaysCount = 4;
}

message ListTasksResponse {
  bool success = 1;
  string message = 2;
  repeated TaskResponse data = 3;
  common.Meta meta = 4;
  TaskStats stats = 5;
}

message UpdateTaskStatusRequest {
  int32 id = 1;
  string status = 2;
}

message TaskTemplateResponse {
  int32 id = 1;
  string classification = 2;
  string rank = 3;
  string taskName = 4;
  string defaultUnit = 5;
  float defaultWeight = 6;
  string createdAt = 7;
  string updatedAt = 8;
}

message FindAllTemplatesRequest {
  string classification = 1;
  string rank = 2;
}

message FindAllTemplatesResponse {
  bool success = 1;
  string message = 2;
  repeated TaskTemplateResponse data = 3;
  common.Meta meta = 4;
}

message CreateTemplateRequest {
  string classification = 1;
  string rank = 2;
  string taskName = 3;
  string defaultUnit = 4;
  float defaultWeight = 5;
}

message UpdateTemplateRequest {
  int32 id = 1;
  string classification = 2;
  string rank = 3;
  string taskName = 4;
  string defaultUnit = 5;
  float defaultWeight = 6;
}

message DeleteTemplateRequest {
  int32 id = 1;
}

message DeleteTemplateResponse {
  bool success = 1;
  string message = 2;
}

message BulkUpdateTemplatesRequest {
  repeated CreateTemplateRequest templates = 1;
}

message BulkUpdateTemplatesResponse {
  bool success = 1;
  string message = 2;
}
