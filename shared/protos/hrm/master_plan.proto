syntax = "proto3";

package hrm;

import "common/common.proto";
import "hrm/task.proto";

service MasterPlanService {
  rpc FindAll (FindAllMasterPlansRequest) returns (MasterPlanList) {}
  rpc FindById (FindMasterPlanByIdRequest) returns (MasterPlan) {}
  rpc Create (CreateMasterPlanRequest) returns (MasterPlan) {}
  rpc Update (UpdateMasterPlanRequest) returns (MasterPlan) {}
  rpc Delete (DeleteMasterPlanRequest) returns (DeleteMasterPlanResponse) {}
  rpc GetHistoricalFeasibility (GetHistoricalFeasibilityRequest) returns (GetHistoricalFeasibilityResponse) {}
}

message MasterPlan {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string type = 4;
  string status = 5;
  string startDate = 6;
  string endDate = 7;
  string documentId = 8;
  string createdAt = 9;
  string updatedAt = 10;
  int32 totalTasks = 11;
  int32 completedTasks = 12;
  repeated task.TaskResponse tasks = 13;
  int32 departmentId = 14;
  string createdByCode = 15;
}

message MasterPlanList {
  bool success = 1;
  string message = 2;
  repeated MasterPlan data = 3;
  common.Meta meta = 4;
}

message FindAllMasterPlansRequest {
  string type = 1;
  string status = 2;
  int32 departmentId = 3;
  string currentUserCode = 4;
  bool isAdmin = 5;
  int32 currentUserDept = 6;
}

message FindMasterPlanByIdRequest {
  int32 id = 1;
  string currentUserCode = 2;
  bool isAdmin = 3;
  int32 currentUserDept = 4;
  repeated int32 callerAncestorUnitIds = 5;
}

message CreateMasterPlanRequest {
  string title = 1;
  string description = 2;
  string type = 3;
  string startDate = 4;
  string endDate = 5;
  string documentId = 6;
  repeated MasterPlanTaskPayload tasks = 7;
  int32 departmentId = 8;
  string createdByCode = 9;
}

message MasterPlanTaskPayload {
  string title = 1;
  float weight = 2;
  float targetValue = 3;
  string unit = 4;
  string supervisor = 5;
  string rankCode = 6;
  int32 rankId = 7;
  string description = 8;
}

message UpdateMasterPlanRequest {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string type = 4;
  string status = 5;
  string startDate = 6;
  string endDate = 7;
  string documentId = 8;
}

message DeleteMasterPlanRequest {
  int32 id = 1;
}

message DeleteMasterPlanResponse {
  bool success = 1;
  string message = 2;
}

message GetHistoricalFeasibilityRequest {
  string type = 1;
  string title = 2;
  int32 durationDays = 3;
}

message HistoricalContext {
  string title = 1;
  int32 total = 2;
  int32 done = 3;
}

message FeasibilityData {
  int32 pastPlansCount = 1;
  int32 totalTasks = 2;
  int32 completedTasks = 3;
  int32 overdueTasks = 4;
  int32 feasibilityScore = 5;
  repeated HistoricalContext historicalContext = 6;
}

message GetHistoricalFeasibilityResponse {
  bool success = 1;
  FeasibilityData data = 2;
}
