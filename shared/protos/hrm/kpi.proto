syntax = "proto3";

package kpi;

import "common/common.proto";

service KpiService {
  rpc FindPeriods (FindPeriodsRequest) returns (PeriodsResponse) {}
  rpc CreatePeriod (CreatePeriodRequest) returns (PeriodResponse) {}
  rpc FindCriteria (FindCriteriaRequest) returns (CriteriaResponse) {}
  rpc CreateCriterion (CreateCriterionRequest) returns (CriterionResponse) {}
  rpc UpdateCriterion (UpdateCriterionRequest) returns (CriterionResponse) {}
  rpc DeleteCriterion (DeleteCriterionRequest) returns (DeleteCriterionResponse) {}
  rpc CreateEvaluation (CreateEvaluationRequest) returns (EvaluationResponse) {}
  rpc FindEvaluations (FindEvaluationsRequest) returns (EvaluationsResponse) {}
  rpc CalculatePersonalKpi (CalculatePersonalKpiRequest) returns (CalculatePersonalKpiResponse) {}
  rpc GetEvaluationDetail (GetEvaluationDetailRequest) returns (KpiEvaluationDetailResponse) {}
  rpc SubmitEvaluation (SubmitEvaluationRequest) returns (EvaluationResponse) {}
  rpc ApproveEvaluation (ApproveEvaluationRequest) returns (EvaluationResponse) {}
  rpc GetEvaluationStats (GetEvaluationStatsRequest) returns (GetEvaluationStatsResponse) {}
}

message FindPeriodsRequest {}

message PeriodResponse {
  int32 id = 1;
  string name = 2;
  string startDate = 3;
  string endDate = 4;
}



message PeriodsResponse {
  bool success = 1;
  string message = 2;
  repeated PeriodResponse data = 3;
  common.Meta meta = 4;
}

message CreatePeriodRequest {
  string name = 1;
  string startDate = 2;
  string endDate = 3;
}

message FindCriteriaRequest {
  bool isAdmin = 1;
}

message CriterionResponse {
  int32 id = 1;
  string name = 2;
  float weight = 3;
  string description = 4;
  float baseScore = 5;
  string scoringMethod = 6;
  string difficulty = 7;
  float difficultyMultiplier = 8;
  int32 bonusThresholdDays = 9;
  float bonusPerDay = 10;
  float penaltyPerDay = 11;
  optional int32 categoryId = 12;
}

message CriteriaResponse {
  bool success = 1;
  string message = 2;
  repeated CriterionResponse data = 3;
  common.Meta meta = 4;
}

message CreateCriterionRequest {
  string name = 1;
  optional string description = 2;
  optional float weight = 3;
  optional float baseScore = 4;
  optional string scoringMethod = 5;
  optional string difficulty = 6;
  optional float difficultyMultiplier = 7;
  optional int32 bonusThresholdDays = 8;
  optional float bonusPerDay = 9;
  optional float penaltyPerDay = 10;
  optional int32 categoryId = 11;
}

message UpdateCriterionRequest {
  int32 id = 1;
  optional string name = 2;
  optional string description = 3;
  optional float weight = 4;
  optional float baseScore = 5;
  optional string scoringMethod = 6;
  optional string difficulty = 7;
  optional float difficultyMultiplier = 8;
  optional int32 bonusThresholdDays = 9;
  optional float bonusPerDay = 10;
  optional float penaltyPerDay = 11;
  optional int32 categoryId = 12;
}

message DeleteCriterionRequest {
  int32 id = 1;
}

message DeleteCriterionResponse {
  bool success = 1;
}

message CreateEvaluationRequest {
  string employeeCode = 1;
  int32 periodId = 2;
  repeated EvaluationDetailInput details = 3;
}

message EvaluationDetailInput {
  int32 criteriaId = 1;
  float selfScore = 2;
  string notes = 3;
}

message EvaluationResponse {
  int32 id = 1;
  string employeeCode = 2;
  int32 periodId = 3;
  string status = 4;
}

message FindEvaluationsRequest {
  string employeeCode = 1;
  string currentEmployeeCode = 2;
  bool isAdmin = 3;
  bool isFetchingOwn = 4;
  repeated int32 callerDescendantUnitIds = 5;
}

message EvaluationsResponse {
  bool success = 1;
  string message = 2;
  repeated EvaluationResponse data = 3;
  common.Meta meta = 4;
}

message CalculatePersonalKpiRequest {
  int32 periodId = 1;
  string employeeCode = 2;
  optional int32 staffingSlotId = 3;
}

message CalculatedTaskScore {
  int32 taskId = 1;
  string title = 2;
  float baseScore = 3;
  float finalScore = 4;
  string completedAt = 5;
  string dueDate = 6;
  string status = 7;
}

message CalculatePersonalKpiResponse {
  bool success = 1;
  string message = 2;
  float totalScore = 3;
  repeated CalculatedTaskScore tasks = 4;
  optional int32 evaluationId = 5;
}

message GetEvaluationDetailRequest {
  int32 id = 1;
}

message KpiEvaluationDetailResponse {
  bool success = 1;
  string message = 2;
  string data = 3; // JSON string representation
}

message SubmitEvaluationRequest {
  int32 id = 1;
  string data = 2; // JSON string
}

message ApproveEvaluationRequest {
  int32 id = 1;
  string data = 2; // JSON string
  string reviewerCode = 3;
}

message GetEvaluationStatsRequest {
  string periodId = 1;
  bool isAdmin = 2;
  repeated int32 callerDescendantUnitIds = 3;
}

message KpiStatByUnit {
  int32 departmentId = 1;
  string departmentName = 2;
  int32 totalEvaluations = 3;
  float avgScore = 4;
}

message GetEvaluationStatsResponse {
  bool success = 1;
  string message = 2;
  message StatsData {
    int32 totalEvaluations = 1;
    float companyAvgScore = 2;
    repeated KpiStatByUnit statsByUnit = 3;
  }
  StatsData data = 3;
}
