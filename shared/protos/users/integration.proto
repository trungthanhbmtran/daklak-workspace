syntax = "proto3";

package integration;

import "common/common.proto";

service IntegrationService {
  rpc FindAll (FindAllIntegrationRequest) returns (FindAllIntegrationResponse) {}
  rpc Create (CreateIntegrationRequest) returns (IntegrationDataResponse) {}
  rpc Update (UpdateIntegrationRequest) returns (IntegrationDataResponse) {}
  rpc Delete (DeleteIntegrationRequest) returns (DeleteIntegrationResponse) {}
  rpc ToggleActive (ToggleActiveIntegrationRequest) returns (IntegrationDataResponse) {}

  // Added from LGSP
  rpc SyncDocuments (SyncDocumentsRequest) returns (SyncDocumentsResponse) {}
  rpc SendDocument (SendDocumentRequest) returns (SendDocumentResponse) {}
}

message SyncDocumentsRequest {
  string configId = 1;
}

message SyncDocumentsResponse {
  bool success = 1;
  string message = 2;
  repeated IntegrationDocument data = 3;
}

message SendDocumentRequest {
  string title = 1;
  string content = 2;
  string source = 3;
  string serviceCode = 4;
}

message SendDocumentResponse {
  bool success = 1;
  string message = 2;
  IntegrationDocument data = 3;
}

message IntegrationDocument {
  string id = 1;
  string title = 2;
  string date = 3;
  string status = 4;
  string source = 5;
}

message IntegrationConfigResponse {
  int32 id = 1;
  string systemName = 2;
  string integrationCode = 3;
  string configData = 4; // JSON string
  bool isActive = 5;
  string createdAt = 6;
  string updatedAt = 7;
}

message FindAllIntegrationRequest {
  string search = 1;
}

message FindAllIntegrationResponse {
  bool success = 1;
  string message = 2;
  repeated IntegrationConfigResponse data = 3;
}

message IntegrationDataResponse {
  bool success = 1;
  string message = 2;
  IntegrationConfigResponse data = 3;
}

message CreateIntegrationRequest {
  string systemName = 1;
  string integrationCode = 2;
  string configData = 3;
}

message UpdateIntegrationRequest {
  int32 id = 1;
  string systemName = 2;
  string integrationCode = 3;
  string configData = 4;
}

message DeleteIntegrationRequest {
  int32 id = 1;
}

message DeleteIntegrationResponse {
  bool success = 1;
  string message = 2;
}

message ToggleActiveIntegrationRequest {
  int32 id = 1;
  bool isActive = 2;
}
