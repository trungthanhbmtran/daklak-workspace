syntax = "proto3";

package pbac;
import "common/common.proto";

// PBAC: Chính sách phân quyền (Policy-Based) – Vai trò + Ma trận quyền
service PbacService {
  // --- Vai trò (Roles) ---
  rpc CreateRole (CreateRoleRequest) returns (RoleResponse);
  rpc FindAllRoles (common.Empty) returns (FindAllRolesResponse);
  rpc FindOneRole (FindOneRoleRequest) returns (RoleDetailResponse);
  rpc UpdateRole (UpdateRoleRequest) returns (RoleResponse);
  rpc DeleteRole (DeleteRoleRequest) returns (RoleResponse);
  // --- Tài nguyên & Quyền CRUD ---
  rpc GetResources (common.Empty) returns (GetResourcesResponse);
  rpc CreateResource (CreateResourceRequest) returns (ResourceResponse);
  rpc UpdateResource (UpdateResourceRequest) returns (ResourceResponse);
  rpc DeleteResource (DeleteResourceRequest) returns (ResourceResponse);
}

message CreateResourceRequest {
  string code = 1;
  string name = 2;
  string service_code = 3;
}

message UpdateResourceRequest {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string service_code = 4;
}

message DeleteResourceRequest {
  int32 id = 1;
}

message ResourceResponse {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string service_code = 4;
}

message GetResourcesResponse {
  repeated ResourceResponse resources = 1;
}


message PolicyItem {
  int32 id = 1;
  int32 resource_id = 2;
  string action = 3;
  string effect = 4;
  string conditions = 5;
}

message CreateRoleRequest {
  string code = 1;
  string name = 2;
  string description = 3;
  repeated PolicyItem policies = 4;
}

message FindOneRoleRequest {
  int32 id = 1;
}

message UpdateRoleRequest {
  int32 id = 1;
  string name = 2;
  string description = 3;
  repeated PolicyItem policies = 4;
}

message DeleteRoleRequest {
  int32 id = 1;
}

message RoleResponse {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
}

message RoleDetailResponse {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  repeated PolicyItem policies = 5;
}

message RoleWithCount {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  int32 users_count = 5;
  int32 permissions_count = 6;
}

message FindAllRolesResponse {
  repeated RoleWithCount roles = 1;
}
