syntax = "proto3";

package menu;

service MenuService {
  rpc GetMyMenus (GetMyMenusRequest) returns (GetMyMenusResponse);
  rpc GetAll (GetAllRequest) returns (GetAllResponse);
  rpc GetOne (GetOneRequest) returns (GetOneResponse);
  rpc Create (CreateMenuRequest) returns (CreateMenuResponse);
  rpc Update (UpdateMenuRequest) returns (UpdateMenuResponse);
  rpc Delete (DeleteMenuRequest) returns (DeleteMenuResponse);
}

message GetMyMenusRequest {
  int32 user_id = 1;
  string app = 2;  // ADMIN_PORTAL, CITIZEN_PORTAL...
}

message MenuNode {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string route = 4;
  string icon = 5;
  int32 order = 6;
  string target = 7;
  int32 parent_id = 8;
  bool is_active = 9;
  string linked_resource_code = 10;
  string type = 11;
  repeated MenuNode children = 12;
}

message GetMyMenusResponse {
  repeated MenuNode items = 1;
}

message GetAllRequest {
  string app = 1;  // ADMIN_PORTAL | CITIZEN_PORTAL, default ADMIN_PORTAL
}
message GetAllResponse {
  repeated MenuItemFlat items = 1;
}

message GetOneRequest {
  int32 id = 1;
}
message GetOneResponse {
  MenuItemFlat menu = 1;
}

message MenuItemFlat {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string route = 4;
  string icon = 5;
  int32 order = 6;
  string target = 7;
  int32 parent_id = 8;
  bool is_active = 9;
  string linked_resource_code = 10;
  string type = 11;
}

message CreateMenuRequest {
  string code = 1;
  string name = 2;
  string route = 3;
  string icon = 4;
  int32 order = 5;
  string target = 6;
  int32 parent_id = 7;
  bool is_active = 8;
  string linked_resource_code = 9;
  string type = 10;
}

message UpdateMenuRequest {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string route = 4;
  string icon = 5;
  int32 order = 6;
  string target = 7;
  int32 parent_id = 8;
  bool is_active = 9;
  string linked_resource_code = 10;
  string type = 11;
}

message CreateMenuResponse {
  MenuItemFlat menu = 1;
}

message UpdateMenuResponse {
  MenuItemFlat menu = 1;
}

message DeleteMenuRequest {
  int32 id = 1;
}

message DeleteMenuResponse {
  bool success = 1;
  string message = 2;
}
