syntax = "proto3";

package user;

service UserService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc FindOne (FindOneRequest) returns (UserResponse);
  rpc GetUsersByIds (GetUsersByIdsRequest) returns (ListUsersResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  rpc AssignPosition (AssignPositionRequest) returns (AssignPositionResponse);
  // Khóa/mở tài khoản (is_active = false/true)
  rpc SetUserActive (SetUserActiveRequest) returns (SetUserActiveResponse);
  // Gán lại vai trò cho user (thay thế toàn bộ role hiện tại)
  rpc AssignRoles (AssignRolesRequest) returns (AssignRolesResponse);
  // Đăng nhập bằng tài khoản (username hoặc email + mật khẩu). SSO dùng Account/OAuth riêng.
  rpc Login (LoginRequest) returns (LoginResponse);
  // Làm mới access_token bằng refresh_token (session)
  rpc Refresh (RefreshRequest) returns (LoginResponse);
  // Thu hồi refresh_token (đăng xuất thiết bị)
  rpc RevokeRefreshToken (RevokeRefreshTokenRequest) returns (RevokeRefreshTokenResponse);
  // Đặt/đổi mật khẩu cho user (khi đã có tài khoản)
  rpc SetPassword (SetPasswordRequest) returns (SetPasswordResponse);
  // Lấy danh sách phòng ban và nhân viên cấp dưới trực tiếp để giao việc
  rpc GetSubordinates (GetSubordinatesRequest) returns (GetSubordinatesResponse);
}

message CreateUserRequest {
  string email = 1;
  string username = 2;
  string password = 3;  // optional: nếu có thì tạo luôn credential đăng nhập
  string full_name = 4;
  string phone_number = 5;
  repeated int32 role_ids = 6;  // gán vai trò khi tạo
  string cccd = 7;             // CCCD/CMND từ HRM – tra cứu, đồng bộ hồ sơ
  string employee_code = 8;    // Mã số điện tử (mã cán bộ) từ HRM
  int32 created_by_user_id = 9;  // ID user phụ trách (từ JWT gateway) – gửi thông báo cho người này
  string created_by_email = 10;  // Email phụ trách – dùng cho thông báo
}

message FindOneRequest {
  int32 id = 1;
}

message GetUsersByIdsRequest {
  repeated int32 ids = 1;
}

message ListUsersRequest {
  // optional: phân trang sau này
  int32 skip = 1;
  int32 take = 2;
  optional string unit_code_starts_with = 3;
}

message ListUsersMeta {
  int32 total = 1;
  int32 skip = 2;
  int32 take = 3;
}

message ListUsersResponse {
  repeated UserResponse data = 1;
  ListUsersMeta meta = 2;
}

// Chính sách hiệu lực (quyền kế thừa từ vai trò) – dùng cho màn chi tiết user
message UserPolicy {
  string description = 1;  // Mô tả: "READ - Quản lý người dùng"
  string resource = 2;     // Mã tài nguyên: USER_MGMT
  string action = 3;
  string effect = 4;
}

message RoleMessage {
  int32 id = 1;
  string code = 2;
  string name = 3;
}

message UserResponse {
  int32 id = 1;
  string email = 2;
  string username = 3;
  string full_name = 4;
  string phone_number = 5;
  string avatar_url = 6;
  bool is_active = 7;
  string cccd = 8;           // CCCD từ HRM
  string employee_code = 9;  // Mã số điện tử từ HRM
  repeated string role_names = 10;  // Tên vai trò được gán (hiển thị chi tiết user)
  repeated UserPolicy policies = 11;  // Chính sách hiệu lực (từ Permission của các Role)
  string unit_name = 12;
  string job_title_name = 13;
  repeated RoleMessage roles = 14;
  repeated string permissions_flatten = 15;
  optional int32 unit_id = 16;
  optional string job_title_code = 17;
  optional string unit_code = 18;
}

message SetUserActiveRequest {
  int32 user_id = 1;
  bool is_active = 2;
}

message SetUserActiveResponse {
  bool success = 1;
  string message = 2;
}

message AssignRolesRequest {
  int32 user_id = 1;
  repeated int32 role_ids = 2;
}

message AssignRolesResponse {
  bool success = 1;
  string message = 2;
}

message AssignPositionRequest {
  int32 user_id = 1;
  int32 unit_id = 2;
  int32 job_title_id = 3;
  bool is_primary = 4;
}

message AssignPositionResponse {
  int32 id = 1;
  int32 user_id = 2;
  int32 unit_id = 3;
  int32 job_title_id = 4;
  bool is_primary = 5;
  string unit_name = 6;
  string job_title_name = 7;
}

message LoginRequest {
  string username_or_email = 1;  // có thể nhập username hoặc email
  string password = 2;
  string device_info = 3;   // optional: "Chrome on Windows", user-agent, v.v.
  string ip_address = 4;   // optional: địa chỉ IP client (gateway có thể truyền)
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 user_id = 3;
  string email = 4;
  string username = 5;
  string full_name = 6;
  string unit_name = 7;
  // Thời gian hết hạn (giây) — backend trả về để client/cookie set đúng TTL
  int32 expires_in = 8;
  int32 refresh_token_expires_in = 9;
}

message RefreshRequest {
  string refresh_token = 1;
  string device_info = 2;   // optional: cập nhật khi refresh
  string ip_address = 3;   // optional: cập nhật khi refresh
}

message RevokeRefreshTokenRequest {
  string refresh_token = 1;
}

message RevokeRefreshTokenResponse {
  bool success = 1;
}

message SetPasswordRequest {
  int32 user_id = 1;
  string new_password = 2;
}

message SetPasswordResponse {
  bool success = 1;
}

message GetSubordinatesRequest {
  int32 user_id = 1;
}

message GetSubordinatesResponse {
  repeated int32 allowed_department_ids = 1;
  repeated string allowed_employee_codes = 2;
}
