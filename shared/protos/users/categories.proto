syntax = "proto3";

package category;

service CategoryService {
  rpc GetAllCategories (GetAllCategoriesRequest) returns (GetByGroupResponse);
  rpc GetByGroup (GetByGroupRequest) returns (GetByGroupResponse);
  rpc GetAllGroups (EmptyRequest) returns (GetAllGroupsResponse);
  rpc Create (CreateCategoryRequest) returns (CategoryResponse);
  rpc Update (UpdateCategoryRequest) returns (CategoryResponse);
  rpc Delete (DeleteCategoryRequest) returns (DeleteCategoryResponse);
}

message EmptyRequest {
  string lang = 1;
}

message GetAllCategoriesRequest {
  string lang = 1;
  int32 skip = 2;
  int32 take = 3;
  string search = 4;
}

message Group {
  string code = 1;
  string name = 2;
}

message GetAllGroupsResponse {
  repeated Group groups = 1;
}

message GetByGroupRequest {
  string group = 1;
  string lang = 2;
  int32 skip = 3;
  int32 take = 4;
  string search = 5;
}

message CategoryItem {
  int32 id = 1;
  string group = 2;
  string code = 3;
  string name = 4;
  string description = 5;
  int32 sort = 6;
  bool is_system = 7;
  int32 active = 8;
}

message GetByGroupResponse {
  repeated CategoryItem data = 1;
  int32 total = 2;
}

message CreateCategoryRequest {
  string group = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  int32 order = 5;
}

message UpdateCategoryRequest {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  int32 order = 5;
  bool is_active = 6;
}

message DeleteCategoryRequest {
  int32 id = 1;
}

message CategoryResponse {
  int32 id = 1;
  string group = 2;
  string code = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  bool is_active = 7;
}

message DeleteCategoryResponse {
  bool success = 1;
  string message = 2;
}
