syntax = "proto3";

package lgsp;

import "common/common.proto";

service LgspService {
  rpc SyncDocuments (SyncDocumentsRequest) returns (SyncDocumentsResponse) {}
  rpc SendDocument (SendDocumentRequest) returns (SendDocumentResponse) {}
}

message SyncDocumentsRequest {
  string configId = 1;
}

message SyncDocumentsResponse {
  bool success = 1;
  string message = 2;
  repeated LgspDocument data = 3;
}

message SendDocumentRequest {
  string title = 1;
  string content = 2;
  string source = 3;
  string serviceCode = 4;
}

message SendDocumentResponse {
  bool success = 1;
  string message = 2;
  LgspDocument data = 3;
}

message LgspDocument {
  string id = 1;
  string title = 2;
  string date = 3;
  string status = 4;
  string source = 5;
}
