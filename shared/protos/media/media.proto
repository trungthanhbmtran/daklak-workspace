syntax = "proto3";

package media;

service MediaService {
  // request a presigned URL for single file upload
  rpc RequestUpload (UploadRequest) returns (UploadResponse);
  
  // confirm that the file has been uploaded to storage
  rpc ConfirmUpload (ConfirmRequest) returns (MediaInfo);
  
  // get media metadata and download URL
  rpc GetMedia (MediaIdRequest) returns (MediaInfo);

  // --- Multipart Upload ---
  rpc InitMultipartUpload (InitMultipartRequest) returns (InitMultipartResponse);
  rpc GetMultipartPreSignedUrls (GetMultipartUrlsRequest) returns (GetMultipartUrlsResponse);
  rpc CompleteMultipartUpload (CompleteMultipartRequest) returns (MediaInfo);
}

message UploadRequest {
  string originalName = 1;
  string mimeType = 2;
  int64 size = 3;
  string ownerId = 4;
}

message UploadResponse {
  string uploadUrl = 1;
  string fileId = 2;
  string fileName = 3;
}

message ConfirmRequest {
  string fileId = 1;
}

message MediaIdRequest {
  string fileId = 1;
}

enum MediaStatus {
  PENDING = 0;
  COMPLETED = 1;
  FAILED = 2;
}

message MediaInfo {
  string id = 1;
  string fileName = 2;
  string downloadUrl = 3;
  MediaStatus status = 4;
  string mimeType = 5;
  int64 size = 6;
  string originalName = 7;
  string bucket = 8;
  string ownerId = 9;
  string createdAt = 10;
  string updatedAt = 11;
}

message InitMultipartRequest {
  string originalName = 1;
  string mimeType = 2;
  int64 size = 3;
  string ownerId = 4;
}

message InitMultipartResponse {
  string uploadId = 1;
  string fileKey = 2;
  string fileId = 3;
}

message GetMultipartUrlsRequest {
  string fileKey = 1;
  string uploadId = 2;
  int32 partsCount = 3;
}

message GetMultipartUrlsResponse {
  repeated string presignedUrls = 1;
}

message PartInfo {
  int32 partNumber = 1;
  string eTag = 2;
}

message CompleteMultipartRequest {
  string fileId = 1;
  string fileKey = 2;
  string uploadId = 3;
  repeated PartInfo parts = 4;
}
