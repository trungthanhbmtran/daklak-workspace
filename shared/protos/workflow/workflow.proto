syntax = "proto3";

package workflow;

import "google/protobuf/struct.proto";

service WorkflowService {
  rpc CreateWorkflow (CreateWorkflowRequest) returns (WorkflowResponse);
  rpc UpdateWorkflow (UpdateWorkflowRequest) returns (WorkflowResponse);
  rpc FindOneWorkflow (FindOneWorkflowRequest) returns (WorkflowResponse);
  rpc ListWorkflows (ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc DeleteWorkflow (DeleteWorkflowRequest) returns (DeleteWorkflowResponse);

  rpc FindWorkflowByCode (FindWorkflowByCodeRequest) returns (WorkflowResponse);
  rpc ListModules (EmptyRequest) returns (ListModulesResponse);
  rpc PublishWorkflow (PublishWorkflowRequest) returns (WorkflowResponse);
  rpc ApplyModule (ApplyModuleRequest) returns (WorkflowResponse);

  // Execution Engine
  rpc StartWorkflow (StartWorkflowRequest) returns (WorkflowInstanceResponse);
  rpc TriggerWorkflow (TriggerWorkflowRequest) returns (WorkflowInstanceResponse);
  rpc ResumeWorkflow (ResumeWorkflowRequest) returns (WorkflowInstanceResponse);
  rpc ValidateAction (ValidateActionRequest) returns (ValidateActionResponse);
  rpc GetInstance (GetInstanceRequest) returns (WorkflowInstanceResponse);
  rpc GetAllowedActions (GetAllowedActionsRequest) returns (GetAllowedActionsResponse);
  rpc ListInstances (ListInstancesRequest) returns (ListInstancesResponse);
  rpc GetInitialNode (GetInitialNodeRequest) returns (GetInitialNodeResponse);
  rpc GetNextNode (GetNextNodeRequest) returns (GetNextNodeResponse);
  // API Integrations
  rpc CreateIntegration (CreateIntegrationRequest) returns (IntegrationResponse);
  rpc UpdateIntegration (UpdateIntegrationRequest) returns (IntegrationResponse);
  rpc FindOneIntegration (FindOneIntegrationRequest) returns (IntegrationResponse);
  rpc FindAllIntegrations (EmptyRequest) returns (FindAllIntegrationsResponse);
  rpc DeleteIntegration (DeleteIntegrationRequest) returns (DeleteIntegrationResponse);
}

message EmptyRequest {}

message ListModulesResponse {
  repeated WorkflowModule items = 1;
}

message WorkflowModule {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  string updatedAt = 5;
}

message PublishWorkflowRequest {
  string id = 1;
}

message ApplyModuleRequest {
  string id = 1;
  string moduleCode = 2;
}

message CreateWorkflowRequest {
  string code = 1;
  string name = 2;
  string description = 3;
  int32 version = 4;
  string status = 5;
  string createdBy = 6;
  google.protobuf.Struct definition = 7;
}

message UpdateWorkflowRequest {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  int32 version = 5;
  string status = 6;
  google.protobuf.Struct definition = 7;
}

message FindOneWorkflowRequest {
  string id = 1;
}

message FindWorkflowByCodeRequest {
  string code = 1;
}

message ListWorkflowsRequest {
  int32 skip = 1;
  int32 take = 2;
  string search = 3;
}

message ListWorkflowsResponse {
  repeated WorkflowResponse items = 1;
  int32 total = 2;
}

message DeleteWorkflowRequest {
  string id = 1;
}

message DeleteWorkflowResponse {
  bool success = 1;
}

message WorkflowResponse {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  int32 version = 5;
  string status = 6;
  string createdBy = 7;
  string createdAt = 8;
  string updatedAt = 9;
  google.protobuf.Struct definition = 10;
  string trigger = 11;
}

message WorkflowNode {
  string id = 1;
  string nodeKey = 2;
  string type = 3;
  string name = 4;
  float x = 5;
  float y = 6;
  string propertiesJson = 7;
  int32 order = 8;
  repeated AssignmentRule assignments = 9;
  repeated NodeAction actions = 10;
}

message WorkflowEdge {
  string id = 1;
  string sourceNodeId = 2;
  string targetNodeId = 3;
  string condition = 4;
  int32 priority = 5;
  bool defaultFlow = 6;
  string propertiesJson = 7;
}

message AssignmentRule {
  string id = 1;
  string type = 2;
  string value = 3;
}

message NodeAction {
  string id = 1;
  string actionType = 2;
  string service = 3;
  string action = 4;
  google.protobuf.Struct payloadTemplate = 5;
  int32 order = 6;
}

message WorkflowVariable {
  string id = 1;
  string key = 2;
  string type = 3;
  google.protobuf.Struct defaultValue = 4;
}

message StartWorkflowRequest {
  string workflowId = 1;
  google.protobuf.Struct initialContext = 2;
  string initiatorId = 3;
  string businessId = 4;
  string businessType = 5;
}

message ValidateActionRequest {
  string instanceId = 1;
  string actionName = 2;
  repeated string userRoles = 3;
  string userId = 4;
  google.protobuf.Struct businessData = 5;
  string workflowId = 6;
  string currentNodeId = 7;
}

message ValidateActionResponse {
  bool allowed = 1;
  string reason = 2;
}

message GetAllowedActionsRequest {
  string instanceId = 1;
  repeated string userRoles = 2;
  string userId = 3;
  google.protobuf.Struct businessData = 4;
  string workflowId = 5;
  string currentNodeId = 6;
}

message GetAllowedActionsResponse {
  repeated string actions = 1;
}

message TriggerWorkflowRequest {
  string trigger = 1;
  google.protobuf.Struct initialContext = 2;
  string initiatorId = 3;
  string businessId = 4;
  string businessType = 5;
}

message ResumeWorkflowRequest {
  string instanceId = 1;
  string nodeId = 2;
  google.protobuf.Struct actionData = 3;
  repeated string userRoles = 4;
}

message GetInstanceRequest {
  string id = 1;
}

message WorkflowInstanceResponse {
  string id = 1;
  string workflowId = 2;
  string status = 3;
  string currentNodeId = 4;
  google.protobuf.Struct context = 5;
  string createdAt = 6;
  string updatedAt = 7;
  string workflowName = 8;
  repeated WorkflowTask tasks = 9;
}

message ListInstancesRequest {
  int32 skip = 1;
  int32 take = 2;
  string workflowId = 3;
  string status = 4;
  string search = 5;
}

message ListInstancesResponse {
  repeated WorkflowInstanceResponse items = 1;
  int32 total = 2;
}

message WorkflowTask {
  string id = 1;
  string instanceId = 2;
  string nodeId = 3;
  string assigneeId = 4;
  string status = 5;
  string startedAt = 6;
  string completedAt = 7;
}

message GetInitialNodeRequest {
  string workflowId = 1;
}

message GetInitialNodeResponse {
  string initialNodeId = 1;
  string nodeData = 2;
}

message GetNextNodeRequest {
  string workflowId = 1;
  string currentNodeId = 2;
  string actionName = 3;
  google.protobuf.Struct evalContext = 4;
}

message GetNextNodeResponse {
  string nextNodeId = 1;
  string nextNodeData = 2;
  string type = 3;
}

// =============================================================================
// API INTEGRATION MESSAGES
// =============================================================================

message CreateIntegrationRequest {
  string name = 1;
  string code = 2;
  string description = 3;
  string protocol = 4;
  string baseUrl = 5;
  string authType = 6;
  google.protobuf.Struct authConfig = 7;
  google.protobuf.Struct headers = 8;
  repeated google.protobuf.Struct endpoints = 9;
  google.protobuf.Struct metadata = 10;
  bool isActive = 11;
}

message UpdateIntegrationRequest {
  string id = 1;
  string name = 2;
  string code = 3;
  string description = 4;
  string protocol = 5;
  string baseUrl = 6;
  string authType = 7;
  google.protobuf.Struct authConfig = 8;
  google.protobuf.Struct headers = 9;
  repeated google.protobuf.Struct endpoints = 10;
  google.protobuf.Struct metadata = 11;
  bool isActive = 12;
}

message FindOneIntegrationRequest {
  string id = 1;
}

message DeleteIntegrationRequest {
  string id = 1;
}

message DeleteIntegrationResponse {
  bool success = 1;
  string message = 2;
}

message IntegrationResponse {
  string id = 1;
  string name = 2;
  string code = 3;
  string description = 4;
  string protocol = 5;
  string baseUrl = 6;
  string authType = 7;
  google.protobuf.Struct authConfig = 8;
  google.protobuf.Struct headers = 9;
  repeated google.protobuf.Struct endpoints = 10;
  google.protobuf.Struct metadata = 11;
  bool isActive = 12;
  string createdAt = 13;
  string updatedAt = 14;
}

message FindAllIntegrationsResponse {
  repeated IntegrationResponse items = 1;
}
