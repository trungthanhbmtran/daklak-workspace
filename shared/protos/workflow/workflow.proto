syntax = "proto3";

package workflow;

import "google/protobuf/struct.proto";

service WorkflowService {
  rpc CreateWorkflow (CreateWorkflowRequest) returns (WorkflowResponse);
  rpc UpdateWorkflow (UpdateWorkflowRequest) returns (WorkflowResponse);
  rpc FindOneWorkflow (FindOneWorkflowRequest) returns (WorkflowResponse);
  rpc ListWorkflows (ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc DeleteWorkflow (DeleteWorkflowRequest) returns (DeleteWorkflowResponse);

  // Execution Engine
  rpc StartWorkflow (StartWorkflowRequest) returns (WorkflowInstanceResponse);
  rpc TriggerWorkflow (TriggerWorkflowRequest) returns (WorkflowInstanceResponse);
  rpc ResumeWorkflow (ResumeWorkflowRequest) returns (WorkflowInstanceResponse);
  rpc GetInstance (GetInstanceRequest) returns (WorkflowInstanceResponse);
  rpc GetLogs (GetLogsRequest) returns (GetLogsResponse);
}

message CreateWorkflowRequest {
  string name = 1;
  string description = 2;
  google.protobuf.Struct definition = 3;
  string trigger = 4;
}

message UpdateWorkflowRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Struct definition = 4;
  string trigger = 5;
}

message FindOneWorkflowRequest {
  string id = 1;
}

message ListWorkflowsRequest {
  int32 skip = 1;
  int32 take = 2;
}

message ListWorkflowsResponse {
  repeated WorkflowResponse items = 1;
  int32 total = 2;
}

message DeleteWorkflowRequest {
  string id = 1;
}

message DeleteWorkflowResponse {
  bool success = 1;
}

message WorkflowResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Struct definition = 4;
  string trigger = 5;
  bool active = 6;
  int32 version = 7;
  string createdAt = 8;
  string updatedAt = 9;
}

message StartWorkflowRequest {
  string workflowId = 1;
  google.protobuf.Struct initialContext = 2;
  string initiatorId = 3;
}

message TriggerWorkflowRequest {
  string trigger = 1;
  google.protobuf.Struct initialContext = 2;
  string initiatorId = 3;
}

message ResumeWorkflowRequest {
  string instanceId = 1;
  string nodeId = 2;
  google.protobuf.Struct actionData = 3;
  repeated string userRoles = 4;
}

message GetInstanceRequest {
  string id = 1;
}

message GetLogsRequest {
  string instanceId = 1;
}

message WorkflowInstanceResponse {
  string id = 1;
  string workflowId = 2;
  string status = 3;
  string currentNodeId = 4;
  google.protobuf.Struct context = 5;
  string createdAt = 6;
  string updatedAt = 7;
  string workflowName = 8;
  repeated ExecutionLog logs = 9;
}

message GetLogsResponse {
  repeated ExecutionLog logs = 1;
}

message ExecutionLog {
  string id = 1;
  string nodeId = 2;
  string nodeType = 3;
  string nodeLabel = 4;
  string action = 5;
  google.protobuf.Struct data = 6;
  string error = 7;
  string createdAt = 8;
}
