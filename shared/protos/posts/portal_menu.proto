syntax = "proto3";

package portal_menu;

import "common/common.proto";

service PortalMenuService {
  rpc Create(CreatePortalMenuRequest) returns (PortalMenuResponse);
  rpc GetOne(GetOneRequest) returns (PortalMenuResponse);
  rpc GetAll(GetAllRequest) returns (GetAllResponse);
  rpc Update(UpdatePortalMenuRequest) returns (PortalMenuResponse);
  rpc Delete(DeletePortalMenuRequest) returns (common.DeleteResponse);
  rpc GetTree(GetTreeRequest) returns (GetTreeResponse);
}

message PortalMenu {
  string id = 1;
  string name = 2;
  string slug = 3;
  string path = 4;
  string icon = 5;
  string target = 6;
  string parentId = 7;
  string linkType = 8;
  string position = 9;
  int32 orderIndex = 10;
  bool status = 11;
  string createdAt = 12;
  string updatedAt = 13;
  repeated PortalMenu children = 14;
}

message PortalMenuResponse {
  PortalMenu data = 1;
}

message GetAllRequest {
  string position = 1;
  bool activeOnly = 2;
}

message GetAllResponse {
  repeated PortalMenu data = 1;
}

message GetOneRequest {
  string id = 1;
}

message CreatePortalMenuRequest {
  string name = 1;
  string slug = 2;
  string path = 3;
  string icon = 4;
  string target = 5;
  string parentId = 6;
  string linkType = 7;
  string position = 8;
  int32 orderIndex = 9;
  bool status = 10;
}

message UpdatePortalMenuRequest {
  string id = 1;
  string name = 2;
  string slug = 3;
  string path = 4;
  string icon = 5;
  string target = 6;
  string parentId = 7;
  string linkType = 8;
  string position = 9;
  int32 orderIndex = 10;
  bool status = 11;
}

message DeletePortalMenuRequest {
  string id = 1;
}

message GetTreeRequest {
  string position = 1;
}

message GetTreeResponse {
  repeated PortalMenu data = 1;
}
