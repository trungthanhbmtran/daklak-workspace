image:
  repository: redis
  tag: "7"
service:
  port: 6379

persistence:
  enabled: true
  size: 1Gi
  storageClass: "hostpath"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

probes:
  liveness:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 10