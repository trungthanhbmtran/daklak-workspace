apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      initContainers:
        - name: prisma-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Never
          command:
            - ./node_modules/.bin/prisma
            - migrate
            - deploy
            - --schema=./prisma/schema/main.prisma
          env:
            - name: DATABASE_URL
              value: "mysql://{{ .Values.database.user }}:{{ .Values.database.rootPassword }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.service.targetPort | default 50051 }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: GRPC_URL
              value: "0.0.0.0:{{ .Values.service.targetPort | default 50051 }}"
            {{- if and .Values.database (not (index .Values.env "DATABASE_URL")) }}
            - name: DATABASE_URL
              value: "mysql://{{ .Values.database.user }}:{{ .Values.database.rootPassword }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            {{- end }}
            {{- if .Values.minio }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.minio.endpoint | quote }}
            - name: MINIO_PORT
              value: {{ .Values.minio.port | quote }}
            - name: MINIO_EXTERNAL_ENDPOINT
              value: {{ .Values.minio.externalEndpoint | quote }}
            - name: MINIO_USE_SSL
              value: {{ .Values.minio.useSsl | quote }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: MINIO_REGION
              value: {{ .Values.minio.region | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
