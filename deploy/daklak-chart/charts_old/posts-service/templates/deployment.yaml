apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      initContainers:
        - name: prisma-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Never
          command:
            - ./node_modules/.bin/prisma
            - migrate
            - deploy
            - --schema=./prisma/schema.prisma
          env:
            - name: DATABASE_URL
              value: "mysql://{{ .Values.database.user | default "root" }}:{{ .Values.database.rootPassword }}@{{ .Values.database.host }}:3306/{{ .Values.database.name }}"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.service.targetPort | default 50055 }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: GRPC_URL
              value: "0.0.0.0:{{ .Values.service.targetPort | default 50055 }}"
            {{- if and .Values.database (not (index .Values.env "DATABASE_URL")) }}
            - name: DATABASE_URL
              value: "mysql://{{ .Values.database.user }}:{{ .Values.database.rootPassword }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            {{- end }}
            {{- if and .Values.rabbitmq (not (index .Values.env "RABBITMQ_URL")) }}
            - name: RABBITMQ_URL
              value: {{ .Values.rabbitmq.url | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
