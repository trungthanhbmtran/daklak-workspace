name: CI - Lint, Build, Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'shared/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin_khcn: apps/admin_khcn/**
            api-gateway: apps/api-gateway/**
            hrm-service: apps/hrm-service/**
            media-service: apps/media-service/**
            notification_service: apps/notification_service/**
            posts_service: apps/posts_service/**
            translate_service: apps/translate_service/**
            user-service: apps/user-service/**
            workflow-service: apps/workflow-service/**

      # 🔥 convert sang JSON array chuẩn
      - name: Set matrix
        id: set-matrix
        run: |
          SERVICES=$(echo '${{ toJSON(steps.filter.outputs) }}' | jq -r '
            to_entries
            | map(select(.value == "true"))
            | map(.key)
          ')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  lint-build-test:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 cache đúng cách
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/${{ matrix.service }}/node_modules
          key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('apps/${{ matrix.service }}/package-lock.json') }}

      - name: Install dependencies
        run: npm ci
        working-directory: apps/${{ matrix.service }}

      - name: Lint
        run: npm run lint
        working-directory: apps/${{ matrix.service }}

      - name: Build
        run: npm run build
        working-directory: apps/${{ matrix.service }}

      # ✅ optional nếu có test
      - name: Test
        run: npm run test --if-present
        working-directory: apps/${{ matrix.service }}