name: Build, Push & Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 🐳 Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔨 Build & Push Service
      - name: Build & Push Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/user-service/Dockerfile
          target: runner
          push: true
          tags: |
            thanhtran1993/daklak-user-service:latest
            thanhtran1993/daklak-user-service:${{ github.sha }}

      # 🔨 Build & Push Migration
      - name: Build & Push Migration
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/user-service/Dockerfile
          target: migration
          push: true
          tags: |
            thanhtran1993/daklak-user-service-migration:latest
            thanhtran1993/daklak-user-service-migration:${{ github.sha }}

      # ☸️ Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 🔐 Setup kubeconfig
      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # ⎈ Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # 🚀 Deploy bằng Helm
      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          helm upgrade --install user-service ./helm \
            --set image.tag=${{ github.sha }} \
            --set migration.image.tag=${{ github.sha }}