name: Build Services

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'shared/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - admin_khcn
          - api-gateway
          - e_portal
          - hrm-service
          - media-service
          - notification_service
          - posts_service
          - translate_service
          - user-service

    steps:

    - uses: actions/checkout@v4

    - name: Login registry
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build image
      run: |
        docker build \
          -t ghcr.io/${{ github.repository_owner }}/daklak-${{ matrix.service }}:${{ github.sha }} \
          -t ghcr.io/${{ github.repository_owner }}/daklak-${{ matrix.service }}:latest \
          -f ./apps/${{ matrix.service }}/Dockerfile \
          .

    - name: Push image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/daklak-${{ matrix.service }}:${{ github.sha }}
        docker push ghcr.io/${{ github.repository_owner }}/daklak-${{ matrix.service }}:latest

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Deploy Helm
      run: |
        helm upgrade ${{ matrix.service }} ./helm/${{ matrix.service }} \
          --set image.repository=ghcr.io/${{ github.repository_owner }}/daklak-${{ matrix.service }} \
          --set image.tag=${{ github.sha }} \
          --namespace daklak