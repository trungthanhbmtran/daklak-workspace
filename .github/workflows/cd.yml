name: CD - Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'deploy/daklak-chart/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read
  packages: write

jobs:
# ==========================================
# 1. Detect changed services
# ==========================================
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.prepare.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/cd.yml'
              - 'shared/**'

            admin_khcn: 'apps/admin_khcn/**'
            api-gateway: 'apps/api-gateway/**'
            hrm-service: 'apps/hrm-service/**'
            media-service: 'apps/media-service/**'
            notification_service: 'apps/notification_service/**'
            posts_service: 'apps/posts_service/**'
            translate_service: 'apps/translate_service/**'
            user-service: 'apps/user-service/**'

      - id: prepare
        run: |
          if [ "${{ steps.filter.outputs.workflow }}" == "true" ]; then
            SERVICES='["admin_khcn","api-gateway","hrm-service","media-service","notification_service","posts_service","translate_service","user-service"]'
          else
            SERVICES='${{ steps.filter.outputs.changes }}'
          fi

          echo "Changed services: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

# ==========================================
# 2. Build & Push Docker images
# ==========================================
  build-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != '' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set metadata
        id: meta
        run: |
          IMAGE_NAME=$(echo ${{ matrix.service }} | tr '_' '-')
          echo "IMAGE_NAME=daklak-$IMAGE_NAME" >> $GITHUB_OUTPUT

          if [[ "${{ matrix.service }}" == "user-service" ]]; then
            echo "HAS_MIGRATION=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_MIGRATION=false" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Build & Push Migration
        if: steps.meta.outputs.HAS_MIGRATION == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: migration
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:latest

# ==========================================
# 3. Deploy to Kubernetes
# ==========================================
  deploy:
    needs: [filter, build-push]
    if: |
      always() &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        run: |
          printf "%s" "${{ secrets.KUBECONFIG_BASE64 }}" | tr -d '[:space:]' | base64 -d > kubeconfig
          chmod 600 kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Check cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Prepare Helm values
        id: helm
        run: |
          SERVICES='${{ needs.filter.outputs.services }}'

          HELM_OPTS=""

          for svc in $(echo $SERVICES | jq -r '.[]'); do
            NAME=$(echo $svc | tr '_' '-')

            HELM_OPTS="$HELM_OPTS \
              --set $NAME.image.repository=${{ secrets.DOCKER_USERNAME }}/daklak-$NAME \
              --set $NAME.image.tag=${{ github.sha }}"

            if [[ "$svc" == "user-service" ]]; then
              HELM_OPTS="$HELM_OPTS \
                --set $NAME.migration.image.repository=${{ secrets.DOCKER_USERNAME }}/daklak-$NAME-migration \
                --set $NAME.migration.image.tag=${{ github.sha }}"
            fi
          done

          echo "opts=$HELM_OPTS" >> $GITHUB_OUTPUT

      - name: Deploy with Helm
        run: |
          helm upgrade --install daklak ./deploy/daklak-chart \
            --namespace production \
            --create-namespace \
            --values ./deploy/daklak-chart/values-prod.yaml \
            ${{ steps.helm.outputs.opts }} \
            --atomic \
            --wait \
            --timeout 10m

      - name: Verify rollout
        run: |
          SERVICES='${{ needs.filter.outputs.services }}'

          for svc in $(echo $SERVICES | jq -r '.[]'); do
            NAME=$(echo $svc | tr '_' '-')
            echo "Checking rollout for $NAME..."

            kubectl rollout status deployment/$NAME \
              -n production \
              --timeout=120s
          done