name: CD - Deploy to VPS (Self-hosted)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'deploy/daklak-chart/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read
  packages: write

jobs:

# ==========================================
# 1. Detect changed services
# ==========================================
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.prepare.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/cd.yml'
              - 'shared/**'

            admin_khcn: 'apps/admin_khcn/**'
            api-gateway: 'apps/api-gateway/**'
            hrm-service: 'apps/hrm-service/**'
            media-service: 'apps/media-service/**'
            notification_service: 'apps/notification_service/**'
            posts_service: 'apps/posts_service/**'
            translate_service: 'apps/translate_service/**'
            user-service: 'apps/user-service/**'

      - id: prepare
        run: |
          if [ "${{ steps.filter.outputs.workflow }}" == "true" ]; then
            SERVICES='["admin_khcn","api-gateway","hrm-service","media-service","notification_service","posts_service","translate_service","user-service"]'
          else
            SERVICES='${{ steps.filter.outputs.changes }}'
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT


# ==========================================
# 2. Build & Push Docker images
# ==========================================
  build-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != '' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set metadata
        id: meta
        run: |
          IMAGE_NAME=$(echo ${{ matrix.service }} | tr '_' '-')
          echo "IMAGE_NAME=daklak-$IMAGE_NAME" >> $GITHUB_OUTPUT

          if [ -d "apps/${{ matrix.service }}/prisma" ]; then
            echo "HAS_MIGRATION=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_MIGRATION=false" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest

      - name: Build & Push Migration
        if: steps.meta.outputs.HAS_MIGRATION == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: migration
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:latest


# ==========================================
# 3. Deploy on VPS (Self-hosted runner)
# ==========================================
  deploy:
    needs: [filter, build-push]
    if: |
      always() &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')

    runs-on: [self-hosted, daklak]

    steps:
      - name: Pull latest code (optional)
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy
        run: |
          cd ${{ secrets.DEPLOY_PATH }}

          echo "📦 Pull images..."
          docker compose pull

          echo "🗄 Run migrations..."
          docker compose run --rm user-service-migration || true
          docker compose run --rm posts-service-migration || true
          docker compose run --rm notification-service-migration || true

          echo "🚀 Start services..."
          docker compose up -d

          echo "🧹 Cleanup..."
          docker system prune -f