name: CD - Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'deploy/daklak-chart/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read
  packages: write

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.prepare.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow: 
              - '.github/workflows/cd.yml'
              - 'shared/**'
            admin_khcn: 'apps/admin_khcn/**'
            api-gateway: 'apps/api-gateway/**'
            e_portal: 'apps/e_portal/**'
            hrm-service: 'apps/hrm-service/**'
            media-service: 'apps/media-service/**'
            notification_service: 'apps/notification_service/**'
            posts_service: 'apps/posts_service/**'
            translate_service: 'apps/translate_service/**'
            user-service: 'apps/user-service/**'

      - id: prepare
        shell: bash
        run: |
          # If workflow or shared changed, build EVERYTHING
          if [ "${{ steps.filter.outputs.workflow }}" == "true" ]; then
            echo 'services=["admin_khcn", "api-gateway", "e_portal", "hrm-service", "media-service", "notification_service", "posts_service", "translate_service", "user-service"]' >> $GITHUB_OUTPUT
          else
            echo "services=${{ steps.filter.outputs.changes }}" >> $GITHUB_OUTPUT
          fi

  build-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Meta
        id: meta
        run: |
          IMAGE_NAME=$(echo ${{ matrix.service }} | tr '_' '-')
          echo "IMAGE_NAME=daklak-$IMAGE_NAME" >> $GITHUB_OUTPUT
          
          HAS_MIGRATION="false"
          if [[ "${{ matrix.service }}" =~ ^(user-service|hrm-service|posts_service|media-service|translate_service)$ ]]; then
            HAS_MIGRATION="true"
          fi
          echo "HAS_MIGRATION=$HAS_MIGRATION" >> $GITHUB_OUTPUT

      - name: Build and Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and Push Migration
        if: steps.meta.outputs.HAS_MIGRATION == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: migration
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:${{ github.sha }}

  deploy:
    needs: [filter, build-push]
    if: |
      always() && 
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      (needs.filter.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=${{ github.workspace }}/kubeconfig" >> $GITHUB_ENV

      - name: Deploy with Helm
        run: |
          SERVICES=(admin-khcn api-gateway e-portal hrm-service media-service notification-service posts-service translate-service user-service)
          HELM_OPTS=""
          for svc in "${SERVICES[@]}"; do
            HELM_OPTS="$HELM_OPTS --set $svc.image.tag=${{ github.sha }} --set $svc.image.repository=${{ secrets.DOCKER_USERNAME }}/daklak-$svc"
            if [[ "$svc" =~ ^(user-service|hrm-service|posts-service|media-service|translate-service)$ ]]; then
              HELM_OPTS="$HELM_OPTS --set $svc.migration.image.tag=${{ github.sha }} --set $svc.migration.image.repository=${{ secrets.DOCKER_USERNAME }}/daklak-$svc-migration"
            fi
          done

          helm upgrade --install daklak ./deploy/daklak-chart \
            --namespace production \
            --create-namespace \
            --values ./deploy/daklak-chart/values.yaml \
            $HELM_OPTS \
            --wait \
            --timeout 10m0s