name: CD - Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'deploy/daklak-chart/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read
  packages: write

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.prepare.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow: 
              - '.github/workflows/cd.yml'
              - 'shared/**'
            admin_khcn: 'apps/admin_khcn/**'
            api-gateway: 'apps/api-gateway/**'
            hrm-service: 'apps/hrm-service/**'
            media-service: 'apps/media-service/**'
            notification_service: 'apps/notification_service/**'
            posts_service: 'apps/posts_service/**'
            translate_service: 'apps/translate_service/**'
            user-service: 'apps/user-service/**'

      - id: prepare
        shell: bash
        run: |
          if [ "${{ steps.filter.outputs.workflow }}" == "true" ]; then
            SERVICES='["admin_khcn", "api-gateway", "hrm-service", "media-service", "notification_service", "posts_service", "translate_service", "user-service"]'
          else
            SERVICES="${{ steps.filter.outputs.changes }}"
          fi
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  build-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Meta
        id: meta
        run: |
          IMAGE_NAME=$(echo ${{ matrix.service }} | tr '_' '-')
          echo "IMAGE_NAME=daklak-$IMAGE_NAME" >> $GITHUB_OUTPUT
          
          HAS_MIGRATION="false"
          if [[ "${{ matrix.service }}" == "user-service" ]]; then
            HAS_MIGRATION="true"
          fi
          echo "HAS_MIGRATION=$HAS_MIGRATION" >> $GITHUB_OUTPUT

      - name: Build and Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and Push Migration
        if: steps.meta.outputs.HAS_MIGRATION == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: migration
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}-migration:${{ github.sha }}

  deploy:
    needs: [filter, build-push]
    if: |
      always() && 
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') &&
      (needs.filter.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Setup kubeconfig
        run: |
          # Create kubeconfig from secret (handle both base64 and raw YAML)
          SECRET_DATA="${{ secrets.KUBECONFIG_BASE64 }}"
          if [[ -z "$SECRET_DATA" ]]; then
            echo "ERROR: KUBECONFIG_BASE64 secret is empty!"
            exit 1
          fi

          if [[ "$SECRET_DATA" == *"apiVersion"* ]]; then
            echo "Secret looks like raw YAML. Using as-is."
            echo "$SECRET_DATA" > kubeconfig
          else
            echo "Secret looks like base64. Decoding..."
            echo "$SECRET_DATA" | base64 -d -i > kubeconfig || { echo "ERROR: Failed to decode base64. Please ensure KUBECONFIG_BASE64 is valid base64 or raw YAML."; exit 1; }
          fi
          
          chmod 600 kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
          
          # Debug: check file content
          if [ -s "kubeconfig" ]; then
            echo "Kubeconfig file created successfully ($(stat -c%s kubeconfig) bytes)."
          else
            echo "ERROR: Kubeconfig file is empty after processing."
            exit 1
          fi

      - name: Deploy with Helm
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          echo "Checking cluster connectivity..."
          kubectl cluster-info || { echo "ERROR: Cannot reach K8s cluster. Check your KUBECONFIG_BASE64 secret and cluster accessibility."; exit 1; }
          
          echo "Checking nodes..."
          kubectl get nodes || echo "Warning: Could not list nodes, but cluster-info succeeded."

          SERVICES=(admin-khcn api-gateway hrm-service media-service notification-service posts-service translate-service user-service)
          HELM_OPTS=""
          for svc in "${SERVICES[@]}"; do
            HELM_OPTS="$HELM_OPTS --set $svc.image.tag=${{ github.sha }} --set $svc.image.repository=${{ secrets.DOCKER_USERNAME }}/daklak-$svc"
            if [[ "$svc" == "user-service" ]]; then
              HELM_OPTS="$HELM_OPTS --set $svc.migration.image.tag=${{ github.sha }} --set $svc.migration.image.repository=${{ secrets.DOCKER_USERNAME }}/daklak-$svc-migration"
            fi
          done

          echo "Running Helm Upgrade..."
          helm upgrade --install daklak ./deploy/daklak-chart \
            --namespace production \
            --create-namespace \
            --values ./deploy/daklak-chart/values.yaml \
            $HELM_OPTS \
            --debug \
            --timeout 15m0s