name: CD - Deploy to VPS (SSH)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'deploy/**'
      - '.github/workflows/cd.yml'

permissions:
  contents: read
  packages: write

jobs:

# ==========================================
# 1. Detect changed services
# ==========================================
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.prepare.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/cd.yml'
              - 'shared/**'

            admin_khcn: 'apps/admin_khcn/**'
            api-gateway: 'apps/api-gateway/**'
            hrm-service: 'apps/hrm-service/**'
            media-service: 'apps/media-service/**'
            notification_service: 'apps/notification_service/**'
            posts-service: 'apps/posts-service/**'
            translate_service: 'apps/translate_service/**'
            user-service: 'apps/user-service/**'
            workflow-service: 'apps/workflow-service/**'
            document-service: 'apps/document-service/**'
            portal-goverment: 'apps/portal-goverment/**'

      - id: prepare
        run: |
          if [ "${{ steps.filter.outputs.workflow }}" == "true" ]; then
            SERVICES='["admin_khcn","api-gateway","hrm-service","media-service","notification_service","posts-service","translate_service","user-service","workflow-service","document-service","portal-goverment"]'
          else
            SERVICES='${{ steps.filter.outputs.changes }}'
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT


# ==========================================
# 2. Build & Push Docker images (ONLY 1 IMAGE)
# ==========================================
  build-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != '' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set metadata
        id: meta
        run: |
          IMAGE_NAME=$(echo ${{ matrix.service }} | tr '_' '-')
          echo "IMAGE_NAME=daklak-$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build & Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest


# ==========================================
# 3. Deploy on VPS via SSH
# ==========================================
  deploy:
    needs: [filter, build-push]
    if: |
      always() &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')

    runs-on: ubuntu-latest # Chuyển từ self-hosted sang ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }} # Thêm dòng này
          # key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }} # Mặc định port 22 nếu không cấu hình secret
          script_stop: true # Dừng script nếu có lỗi xảy ra
          script: |
            echo "🔐 Login Docker Hub..."
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            echo "📂 Go to deploy directory..."
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📦 Pull images..."
            docker compose -f docker-compose.prod.yml pull

            echo "🗄 Run migrations..."
            docker compose -f docker-compose.prod.yml --profile migrate run --rm user-service-migrate || true
            docker compose -f docker-compose.prod.yml --profile migrate run --rm hrm-service-migrate || true
            docker compose -f docker-compose.prod.yml --profile migrate run --rm media-service-migrate || true
            docker compose -f docker-compose.prod.yml --profile migrate run --rm posts-service-migrate || true
            docker compose -f docker-compose.prod.yml --profile migrate run --rm workflow-service-migrate || true
            docker compose -f docker-compose.prod.yml --profile migrate run --rm document-service-migrate || true

            echo "🚀 Start services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Cleanup..."
            docker system prune -f