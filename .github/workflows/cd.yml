name: CD - Deploy to VPS

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:

# ==========================================
# 1. Detect changed services
# ==========================================
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            all:
              - '.github/workflows/cd.yml'
              - 'shared/**'

            admin_khcn: apps/admin_khcn/**
            api-gateway: apps/api-gateway/**
            hrm-service: apps/hrm-service/**
            media-service: apps/media-service/**
            notification_service: apps/notification_service/**
            posts_service: apps/posts_service/**
            translate_service: apps/translate_service/**
            user-service: apps/user-service/**
            workflow-service: apps/workflow-service/**

      - id: set
        run: |
          if [ "${{ steps.filter.outputs.all }}" == "true" ]; then
            SERVICES='["admin_khcn","api-gateway","hrm-service","media-service","notification_service","posts_service","translate_service","user-service","workflow-service"]'
          else
            SERVICES=$(echo '${{ toJSON(steps.filter.outputs) }}' | jq -r '
              to_entries
              | map(select(.value == "true"))
              | map(.key)
            ')
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

# ==========================================
# 2. Build & Push Docker images
# ==========================================
  build-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJSON(needs.filter.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image name
        id: meta
        run: |
          IMAGE_NAME=$(echo ${{ matrix.service }} | tr '_' '-')
          echo "IMAGE_NAME=daklak-$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest

# ==========================================
# 3. Deploy (Smart deploy)
# ==========================================
  deploy:
    needs: [filter, build-push]
    runs-on: [self-hosted, daklak]

    steps:
      - name: Login Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy changed services only
        run: |
          cd ${{ secrets.DEPLOY_PATH }}

          SERVICES='${{ needs.filter.outputs.services }}'

          echo "📦 Pull changed services..."
          for service in $(echo $SERVICES | jq -r '.[]'); do
            NAME=$(echo $service | tr '_' '-')
            docker pull ${{ secrets.DOCKER_USERNAME }}/daklak-$NAME:${{ github.sha }} || true
          done

          echo "🗄 Run migrations (only backend services)..."
          for service in $(echo $SERVICES | jq -r '.[]'); do
            case $service in
              user-service|hrm-service|media-service|posts_service|workflow-service)
                docker compose --profile migrate run --rm ${service}-migrate || true
                ;;
            esac
          done

          echo "🚀 Restart changed services..."
          for service in $(echo $SERVICES | jq -r '.[]'); do
            docker compose up -d $service
          done

          echo "🧹 Cleanup..."
          docker image prune -f