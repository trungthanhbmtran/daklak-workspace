services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mypassword
      MYSQL_DATABASE: admin_systems
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    container_name: minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: user-service
    restart: always
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
    ports:
      - "3001:3001"
      - "50051:50051"
    env_file:
      - apps/user-service/.env

  posts-service:
    build:
      context: .
      dockerfile: apps/posts-service/Dockerfile
    container_name: posts-service
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "50055:50055"
    env_file:
      - apps/posts-service/.env

volumes:
  mysql_data:
  minio_data:
